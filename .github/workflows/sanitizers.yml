name: Sanitizers

on:
  push:
    branches:
      - maintenance/**
      - main
  pull_request:
    branches:
      - main
      - maintenance/**

permissions:
  contents: read # to fetch code (actions/checkout)

env:
  CCACHE_DIR: "${{ github.workspace }}/.ccache"
  CCACHE_MAXSIZE: "500M"
  # Needed because Pixi doesn't set mtime for compilers
  CCACHE_COMPILERCHECK: "content"
  PIXI_CACHE_DIR: "${{ github.workspace }}/.cache/rattler"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  get_commit_message:
    name: Get commit message
    uses: ./.github/workflows/commit_message.yml

  test_ASAN:
    name: Test under AddressSanitizer (shard ${{ matrix.shard }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [blacksmith-4vcpu-ubuntu-2404]
        shard: [0, 1]
    needs: get_commit_message
    if: >
      needs.get_commit_message.outputs.message == 1
      && (github.repository == 'scipy-ci/scipy' || github.repository == '')
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        submodules: recursive
        persist-credentials: false

    - name: Cache pixi
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ${{ env.PIXI_CACHE_DIR }}
        # use os/arch rather than the runner label so that the cache hits
        # across Blacksmith runner sizes (4vcpu/8vcpu/...) but not across
        # architectures (`-arm` runner label suffix -> runner.arch ARM64)
        key: ${{ runner.os }}-${{ runner.arch }}-asan-pixi-${{ hashFiles('pixi.lock') }}
        restore-keys: ${{ runner.os }}-${{ runner.arch }}-asan-pixi-

    - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
      with:
        pixi-version: v0.72.1
        cache: false
        environments: asan
        log-level: q

    - name: Set up ccache
      uses: ./.github/ccache
      with:
        workflow_name: ${{ github.workflow }}
        job_name: ${{ github.job }}-${{ runner.arch }}

    - name: CPU diagnostics
      # the Blacksmith runner fleet is heterogeneous, and crashes have been
      # observed in numpy's AVX512 exp/log kernels on AVX512-capable hosts
      run: |
        grep -o 'avx512[a-z0-9_]*' /proc/cpuinfo | sort -u || echo "no AVX512 on this runner"
        ASAN_OPTIONS=detect_leaks=0 pixi run -e asan python -c "import numpy as np; np.show_runtime()"

    - name: Build SciPy against CPython & NumPy with ASAN
      run: pixi run build-asan -j4

    - name: Ccache performance
      run: |
        pixi exec ccache --evict-older-than 1d
        pixi exec ccache -s

    - name: Test
      env:
        # Workaround for segfaults in numpy's AVX512 float32 exp/log SIMD
        # kernels (simd_exp_FLOAT/simd_log_FLOAT masked tail loads) under the
        # ASan-instrumented build. numpy nightly dispatches by x86-64
        # microarchitecture level; X86_V4 is the AVX512 baseline, keep X86_V3
        # (AVX2) enabled. Unknown names raise an ImportWarning, which scipy's
        # pytest config escalates to an error, so only set this on x86-64.
        # TODO: remove once understood/fixed upstream in numpy.
        NPY_DISABLE_CPU_FEATURES: ${{ runner.arch == 'X64' && 'X86_V4 AVX512_ICL AVX512_SPR' || '' }}
      run: >-
        ASAN_OPTIONS=malloc_context_size=7 pixi run --skip-deps test-asan -j2 --
        --timeout=600 --durations=25
        --shard-id=${{ matrix.shard }} --num-shards=2
